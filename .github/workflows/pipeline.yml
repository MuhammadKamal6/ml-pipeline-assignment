name: Model Validation and Mock Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dvc mlflow torch torchvision

      - name: Pull data with DVC
        run: echo "Skipping dvc pull because this repo is not initialized as a DVC repository"

      - name: Set local MLflow tracking URI
        run: echo "MLFLOW_TRACKING_URI=file:./mlruns" >> $GITHUB_ENV

      - name: Train model and log to MLflow
        run: python train_mlflow.py

      - name: Export MLflow Run ID
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import mlflow

          tracking_uri = os.environ.get("MLFLOW_TRACKING_URI")
          mlflow.set_tracking_uri(tracking_uri)

          client = mlflow.tracking.MlflowClient()
          experiments = client.search_experiments()

          target = None
          for exp in experiments:
              if exp.name == "Assignment3_Muhammad-Kamal":
                  target = exp
                  break

          if target is None:
              raise RuntimeError("Experiment not found in local MLflow store.")

          runs = client.search_runs(
              experiment_ids=[target.experiment_id],
              order_by=["attributes.start_time DESC"],
              max_results=1
          )

          if not runs:
              raise RuntimeError("No MLflow runs found.")

          run_id = runs[0].info.run_id
          Path("model_info.txt").write_text(run_id)
          print(f"Saved Run ID: {run_id}")
          PY

      - name: Upload model info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: |
            model_info.txt
            mlruns

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install MLflow
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      - name: Download model info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Set local MLflow tracking URI
        run: echo "MLFLOW_TRACKING_URI=file:./mlruns" >> $GITHUB_ENV

      - name: Check accuracy threshold
        run: python check_threshold.py

      - name: Mock Docker build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
