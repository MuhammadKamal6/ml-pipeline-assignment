name: Model Validation and Mock Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install dvc mlflow torch torchvision

      - name: Pull data with DVC
        run: dvc pull

      - name: Train model and log to MLflow
        run: python train_mlflow.py

      - name: Export MLflow Run ID
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import mlflow

          tracking_uri = os.environ.get("MLFLOW_TRACKING_URI")
          if tracking_uri:
              mlflow.set_tracking_uri(tracking_uri)

          run = mlflow.last_active_run()
          if run is None:
              raise RuntimeError("No active MLflow run found after training.")

          run_id = run.info.run_id
          Path("model_info.txt").write_text(run_id)
          print(f"Saved Run ID: {run_id}")
          PY

      - name: Upload model info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install MLflow
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      - name: Download model info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Check accuracy threshold
        run: python check_threshold.py

      - name: Mock Docker build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
